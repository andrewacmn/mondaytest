<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: #f1f5f9; color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Loading ── */
#loading-screen { position: fixed; inset: 0; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 900; }
#loading-screen .logo { font-size: 18px; font-weight: 700; color: #0f172a; }
#loading-screen .sub { font-size: 12px; color: #94a3b8; }
.spinner { width: 28px; height: 28px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Error ── */
#error-screen { position: fixed; inset: 0; background: #f8fafc; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 40px; text-align: center; }
#error-screen .err-title { font-size: 16px; font-weight: 700; color: #0f172a; }
#error-screen .err-msg { font-size: 13px; color: #64748b; max-width: 420px; line-height: 1.5; }
#error-screen .err-detail { font-size: 11px; color: #ef4444; background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 8px 12px; max-width: 420px; word-break: break-all; }
.retry-btn { height: 36px; padding: 0 18px; background: #3b82f6; color: #fff; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.retry-btn:hover { background: #2563eb; }

/* ── App ── */
#app { display: none; flex-direction: column; height: 100vh; }
#header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 12px; }
#header-left h1 { font-size: 16px; font-weight: 700; color: #0f172a; }
#header-left p { font-size: 11px; color: #94a3b8; margin-top: 1px; }
#nav { display: flex; align-items: center; gap: 7px; }
.nav-btn { width: 28px; height: 28px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fff; cursor: pointer; font-size: 16px; color: #64748b; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
.nav-btn:hover { background: #f8fafc; }
#week-label { font-size: 13px; font-weight: 600; color: #1e293b; min-width: 190px; text-align: center; }
.hbtn { height: 28px; padding: 0 10px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fff; cursor: pointer; font-size: 11px; font-weight: 500; color: #475569; font-family: inherit; transition: background 0.1s; }
.hbtn:hover { background: #f8fafc; }

/* ── Calendar ── */
#calendar { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); overflow: hidden; background: #e2e8f0; gap: 1px; }
.day-col { background: #fff; display: flex; flex-direction: column; overflow: hidden; }
.day-col.today { background: #eff6ff; }
.day-header { padding: 8px 9px 7px; border-bottom: 1px solid #f1f5f9; background: #f8fafc; flex-shrink: 0; }
.day-col.today .day-header { background: #dbeafe; }
.day-name { font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 1px; }
.day-col.today .day-name { color: #3b82f6; }
.day-num { font-size: 20px; font-weight: 700; color: #1e293b; line-height: 1; }
.day-col.today .day-num { color: #3b82f6; }
.day-month { font-size: 9px; color: #94a3b8; margin-top: 1px; }
.day-count { font-size: 9px; font-weight: 600; color: #64748b; margin-top: 3px; }
.day-col.today .day-count { color: #3b82f6; }
.day-posts { flex: 1; overflow-y: auto; padding: 7px 5px; }
.day-posts::-webkit-scrollbar { width: 3px; }
.day-posts::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }
.empty-day { display: flex; align-items: center; justify-content: center; height: 50px; color: #dde1e7; font-size: 20px; }

/* ── Item card ── */
.item-card { border: 1px solid #e2e8f0; border-radius: 7px; overflow: hidden; cursor: pointer; margin-bottom: 6px; background: #fff; transition: box-shadow 0.15s, border-color 0.15s, transform 0.1s; }
.item-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.09); border-color: #cbd5e1; transform: translateY(-1px); }
.card-bar { height: 3px; }
.card-thumb { aspect-ratio: 4/3; background: #f1f5f9; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
.card-thumb img, .card-thumb video { width: 100%; height: 100%; object-fit: cover; display: block; }
.count-badge { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.6); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
.card-meta { padding: 7px 8px; }
.card-title { font-size: 10px; font-weight: 600; color: #1e293b; line-height: 1.35; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-footer { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.card-pill { font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 82px; }
.card-net { font-size: 9px; color: #94a3b8; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 50px; }

/* ── Detail panel ── */
#panel-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 500; }
#detail-panel { position: fixed; top: 0; right: -460px; bottom: 0; width: 440px; background: #fff; box-shadow: -8px 0 32px rgba(0,0,0,0.1); z-index: 501; display: flex; flex-direction: column; transition: right 0.24s cubic-bezier(0.4,0,0.2,1); overflow: hidden; }
#detail-panel.open { right: 0; }
#panel-header { padding: 18px 20px 14px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; flex-shrink: 0; }
#panel-title { font-size: 17px; font-weight: 700; color: #0f172a; line-height: 1.3; }
#panel-close { background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 20px; line-height: 1; padding: 2px; flex-shrink: 0; }
#panel-close:hover { color: #475569; }
#panel-body { flex: 1; overflow-y: auto; padding: 18px 20px; }
#panel-body::-webkit-scrollbar { width: 4px; }
#panel-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }

/* Panel internals */
.p-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
.p-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
.p-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 18px; }
.p-mi { background: #f8fafc; border-radius: 7px; padding: 9px 11px; }
.p-mi.full { grid-column: 1/-1; }
.p-mi-label { font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.p-mi-value { font-size: 12px; font-weight: 600; color: #1e293b; }
.net-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.net-tag { font-size: 10px; background: #e2e8f0; color: #475569; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
.p-divider { height: 1px; background: #f1f5f9; margin: 16px 0; }
.p-section-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
.p-text-block { background: #f8fafc; border-radius: 7px; padding: 12px 14px; font-size: 12px; color: #334155; line-height: 1.65; white-space: pre-wrap; margin-bottom: 16px; }
.p-link { font-size: 12px; color: #3b82f6; word-break: break-all; text-decoration: none; }
.p-link:hover { text-decoration: underline; }

/* Status select rows */
.status-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.status-field label { display: block; font-size: 10px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
.status-field select { width: 100%; height: 34px; padding: 0 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; font-family: inherit; color: #1e293b; background: #fff; outline: none; cursor: pointer; }
.status-field select:focus { border-color: #3b82f6; }

/* Asset grid in panel */
.asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.asset-card { border: 1px solid #e2e8f0; border-radius: 7px; overflow: hidden; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
.asset-card:hover { border-color: #3b82f6; box-shadow: 0 3px 12px rgba(59,130,246,0.12); }
.asset-thumb { aspect-ratio: 16/9; background: #f1f5f9; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.asset-thumb img, .asset-thumb video { width: 100%; height: 100%; object-fit: cover; display: block; }
.asset-info { padding: 7px 9px; }
.asset-name { font-size: 10px; font-weight: 500; color: #1e293b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.asset-ext { font-size: 9px; color: #94a3b8; text-transform: uppercase; margin-top: 1px; letter-spacing: 0.4px; }
.no-assets { background: #f8fafc; border: 1px dashed #e2e8f0; border-radius: 7px; padding: 20px; text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 18px; }

/* Comments */
.comment-item { background: #f8fafc; border-radius: 7px; padding: 10px 12px; margin-bottom: 8px; }
.comment-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.comment-author { font-size: 11px; font-weight: 600; color: #1e293b; }
.comment-date { font-size: 10px; color: #94a3b8; }
.comment-body { font-size: 12px; color: #334155; line-height: 1.55; white-space: pre-wrap; }
.no-comments { background: #f8fafc; border-radius: 7px; padding: 16px; text-align: center; font-size: 12px; color: #94a3b8; }
.comment-form { margin-bottom: 14px; }
.comment-form textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 7px; padding: 10px 12px; font-size: 12px; font-family: inherit; color: #1e293b; resize: none; outline: none; line-height: 1.5; }
.comment-form textarea:focus { border-color: #3b82f6; }
.comment-submit { display: flex; justify-content: flex-end; margin-top: 8px; }
.submit-btn { height: 32px; padding: 0 14px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.submit-btn:hover { background: #2563eb; }
.submit-btn:disabled { background: #93c5fd; cursor: not-allowed; }

/* ── Lightbox ── */
#lightbox { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; padding: 20px; }
#lightbox.open { display: flex; }
#lb-inner { max-width: 920px; width: 100%; background: #111; border-radius: 10px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.5); }
#lb-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 15px; border-bottom: 1px solid #1e1e1e; }
#lb-filename { font-size: 12px; color: #e2e8f0; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-btns { display: flex; gap: 7px; flex-shrink: 0; margin-left: 12px; }
.lb-btn { font-size: 11px; color: #94a3b8; background: none; border: 1px solid #2a2a2a; border-radius: 5px; padding: 4px 10px; cursor: pointer; text-decoration: none; display: inline-block; font-family: inherit; }
.lb-btn:hover { border-color: #444; color: #e2e8f0; }
#lb-media { background: #000; min-height: 200px; max-height: 72vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
#lb-media img, #lb-media video { max-width: 100%; max-height: 72vh; object-fit: contain; display: block; }
</style>

<script>
'use strict';
const $ = id => document.getElementById(id);

// ─────────────────────────────────────────────────────────────────
// Dropbox URL → direct embeddable URL
// Handles both /s/ share links and newer /scl/fi/ links with rlkey
// ─────────────────────────────────────────────────────────────────
function toDirectUrl(url) {
  if (!url || typeof url !== 'string') return null;
  const u = url.trim();
  if (!u.includes('dropbox.com')) return u;
  let out = u;
  // Swap share domain for direct-content domain
  out = out.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
  // Remove dl=0 or dl=1 while keeping other params like rlkey
  out = out.replace(/([?&])dl=\d(&?)/, (_, pre, post) => post ? pre : '');
  out = out.replace(/[?&]$/, '');
  return out;
}

// ─────────────────────────────────────────────────────────────────
// File type detection
// ─────────────────────────────────────────────────────────────────
function getExt(asset) {
  if (asset.extension) return asset.extension.toLowerCase().replace('.', '');
  const path = (asset.url || '').split('?')[0];
  return (path.split('.').pop() || '').toLowerCase();
}
const isImg = e => /^(jpg|jpeg|png|gif|webp|svg|bmp|tiff)$/.test(e);
const isVid = e => /^(mp4|webm|mov|avi|mkv|m4v)$/.test(e);

// ─────────────────────────────────────────────────────────────────
// Normalise assets — handles every shape monday.com might return
// ─────────────────────────────────────────────────────────────────
function normaliseAssets(raw) {
  if (!raw) return [];
  const wrap = (x, i) => {
    if (!x) return null;
    if (typeof x === 'string') {
      return { id:'s'+i, name: x.split('/').pop()?.split('?')[0]||'File', url:x, extension:(x.split('?')[0].split('.').pop()||'') };
    }
    const url = x.url || x.publicUrl || x.public_url || x.link || x.shareUrl || x.linkUrl || '';
    if (!url) return null;
    return {
      id: x.id ? String(x.id) : 'a'+i,
      name: x.name || url.split('/').pop()?.split('?')[0] || 'File',
      url,
      extension: x.extension || x.file_extension || (url.split('?')[0].split('.').pop()||''),
      downloadUrl: x.downloadUrl || x.public_url || '',
    };
  };
  let items = Array.isArray(raw) ? raw : (typeof raw === 'string' ? [raw] : [raw]);
  return items.map(wrap).filter(x => x && x.url);
}

// ─────────────────────────────────────────────────────────────────
// Status colours
// ─────────────────────────────────────────────────────────────────
const SC = {
  'approved':'#22c55e','ready for client review':'#3b82f6','ready for review':'#3b82f6',
  'amends required':'#f97316','changes requested':'#f97316','in production':'#a855f7',
  'on hold':'#94a3b8','cancelled':'#ef4444','pending':'#94a3b8',
};
const sc = s => SC[(s||'').toLowerCase()] || '#64748b';

// ─────────────────────────────────────────────────────────────────
// Date helpers
// ─────────────────────────────────────────────────────────────────
function getWeekStart(d) {
  const x = new Date(d || new Date());
  x.setDate(x.getDate() - x.getDay());
  x.setHours(0,0,0,0);
  return x;
}
const sameDay = (a,b) => a.toDateString() === b.toDateString();
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ─────────────────────────────────────────────────────────────────
// Column map — cached in localStorage per board
// ─────────────────────────────────────────────────────────────────
const COL_KEY = 'cc_cols_' + CONFIG.boardId;
const saveColMap = m => localStorage.setItem(COL_KEY, JSON.stringify(m));
const loadColMap = () => { try { return JSON.parse(localStorage.getItem(COL_KEY)); } catch { return null; } };

function autoMap(cols) {
  const find = fn => (cols.find(fn) || {}).id || '';
  return {
    dateCol:    find(c => c.type === 'date'),
    filesCol:   find(c => c.type === 'file' || /asset|file/i.test(c.title)),
    conceptCol: find(c => /concept/i.test(c.title) && c.type === 'color'),
    prodCol:    find(c => /product/i.test(c.title) && c.type === 'color'),
    typeCol:    find(c => /type/i.test(c.title)),
    netCol:     find(c => /network|platform/i.test(c.title)),
    copyCol:    find(c => /copy|caption/i.test(c.title)),
    statusCol:  find(c => c.type === 'color' && !/concept|product/i.test(c.title)),
  };
}

// ─────────────────────────────────────────────────────────────────
// monday.com API
// ─────────────────────────────────────────────────────────────────
async function api(query) {
  const r = await fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': CONFIG.apiToken,
      'API-Version': '2024-01',
    },
    body: JSON.stringify({ query }),
  });
  if (!r.ok) throw new Error('monday.com returned HTTP ' + r.status + '. Check your API token.');
  const j = await r.json();
  if (j.errors?.length) throw new Error(j.errors[0].message);
  return j.data;
}

async function fetchColumns() {
  const d = await api(`{ boards(ids:[${CONFIG.boardId}]) { columns { id title type } } }`);
  const cols = d?.boards?.[0]?.columns;
  if (!cols?.length) throw new Error('Board not found or no columns returned. Check your board ID.');
  return cols;
}

async function fetchItems(colMap) {
  const ids = JSON.stringify(Object.values(colMap).filter(Boolean));
  const d = await api(`{
    boards(ids:[${CONFIG.boardId}]) {
      items_page(limit:500) {
        items {
          id name
          assets { id name url public_url file_extension }
          column_values(ids:${ids}) { id value text }
        }
      }
    }
  }`);
  return d?.boards?.[0]?.items_page?.items || [];
}

async function fetchItemDetail(itemId, colMap) {
  const ids = JSON.stringify(Object.values(colMap).filter(Boolean));
  const d = await api(`{
    items(ids:[${itemId}]) {
      id name
      assets { id name url public_url file_extension }
      updates(limit:50) {
        id text_body created_at
        creator { id name }
      }
      column_values(ids:${ids}) { id value text }
    }
  }`);
  return d?.items?.[0] || null;
}

async function postComment(itemId, text) {
  await api(`mutation { create_update(item_id: ${itemId}, body: ${JSON.stringify(text)}) { id } }`);
}

async function updateStatus(itemId, columnId, value) {
  await api(`mutation { change_simple_column_value(item_id: ${itemId}, board_id: ${CONFIG.boardId}, column_id: "${columnId}", value: ${JSON.stringify(value)}) { id } }`);
}

// ─────────────────────────────────────────────────────────────────
// Parse raw item
// ─────────────────────────────────────────────────────────────────
function parseItem(raw, colMap) {
  const out = {
    id: raw.id, name: raw.name,
    assets: normaliseAssets(raw.assets),
    scheduledDate: null,
    conceptStatus: '', productionStatus: '', approvalStatus: '',
    contentType: [], network: [], pushCopy: '',
    conceptExplanation: '', conceptLink: '',
    updates: raw.updates || [],
  };

  (raw.column_values || []).forEach(col => {
    const val = col.value, text = (col.text || '').trim();

    if (col.id === colMap.dateCol && val) {
      try { out.scheduledDate = JSON.parse(val).date || null; } catch {}
    }
    if (col.id === colMap.conceptCol) out.conceptStatus    = text;
    if (col.id === colMap.prodCol)    out.productionStatus = text;
    if (col.id === colMap.statusCol)  out.approvalStatus   = text;
    if (col.id === colMap.copyCol)    out.pushCopy         = text;
    if (col.id === colMap.typeCol && text) out.contentType = text.split(', ').filter(Boolean);
    if (col.id === colMap.netCol  && text) out.network     = text.split(', ').filter(Boolean);

    // Files column — Dropbox links come through here
    if (col.id === colMap.filesCol && val) {
      try {
        const p = JSON.parse(val);
        console.log('[files col raw]', raw.name, p);
        const files = (p.files || []).flatMap((f, i) => {
          const url = f.url || f.linkUrl || f.link || '';
          if (!url) return [];
          return [{
            id: f.assetId ? String(f.assetId) : 'f'+i,
            name: f.name || url.split('/').pop()?.split('?')[0] || 'File',
            url,
            extension: (f.name || url.split('?')[0]).split('.').pop() || '',
          }];
        });
        if (files.length) {
          console.log('[files resolved]', raw.name, files);
          out.assets = files;
        }
      } catch(e) { console.warn('[files parse error]', e); }
    }
  });

  // Fall back to item-level assets if files column gave nothing
  if (!out.assets.length && raw.assets?.length) {
    out.assets = normaliseAssets(raw.assets);
  }

  return out;
}

// ─────────────────────────────────────────────────────────────────
// App state
// ─────────────────────────────────────────────────────────────────
let allItems = [], weekStart = getWeekStart(), colMap = null;

// ─────────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────────
async function boot() {
  if (!CONFIG.apiToken || CONFIG.apiToken === 'YOUR_API_TOKEN_HERE') {
    return showError('API token not set', 'Open this file and paste your token into the CONFIG block at the top.');
  }
  if (!CONFIG.boardId || CONFIG.boardId === 'YOUR_BOARD_ID_HERE') {
    return showError('Board ID not set', 'Open this file and paste your board ID into the CONFIG block at the top.');
  }

  try {
    setMsg('Loading board columns…');
    const cols = await fetchColumns();

    colMap = loadColMap();
    if (!colMap) {
      colMap = autoMap(cols);
      saveColMap(colMap);
    }
    console.log('[colMap]', colMap);

    setMsg('Loading content…');
    const raw = await fetchItems(colMap);
    console.log('[raw items]', raw);

    allItems = raw.map(r => parseItem(r, colMap)).filter(i => i.scheduledDate);
    console.log('[parsed items]', allItems);

    $('loading-screen').style.display = 'none';
    $('app').style.display = 'flex';
    renderCalendar();

  } catch(e) {
    console.error(e);
    showError('Could not load board', e.message);
  }
}

function showError(title, msg) {
  $('loading-screen').style.display = 'none';
  $('error-screen').style.display = 'flex';
  $('err-title').textContent = title;
  $('err-msg').textContent = msg;
}

function setMsg(t) { $('loading-msg').textContent = t; }

// ─────────────────────────────────────────────────────────────────
// Render calendar
// ─────────────────────────────────────────────────────────────────
function renderCalendar() {
  const cal = $('calendar');
  cal.innerHTML = '';

  const we = new Date(weekStart);
  we.setDate(weekStart.getDate() + 6);
  const sm = weekStart.getMonth() === we.getMonth();
  $('week-label').textContent = sm
    ? `${weekStart.getDate()} ${MONTHS[weekStart.getMonth()]} – ${we.getDate()}, ${we.getFullYear()}`
    : `${weekStart.getDate()} ${MONTHS[weekStart.getMonth()]} – ${we.getDate()} ${MONTHS[we.getMonth()]} ${we.getFullYear()}`;

  const today = new Date();
  let total = 0;

  for (let i = 0; i < 7; i++) {
    const day = new Date(weekStart);
    day.setDate(weekStart.getDate() + i);
    const isTd = sameDay(day, today);
    const di = allItems.filter(x => sameDay(new Date(x.scheduledDate), day));
    total += di.length;

    const col = document.createElement('div');
    col.className = 'day-col' + (isTd ? ' today' : '');
    col.innerHTML = `
      <div class="day-header">
        <div class="day-name">${DAYS[day.getDay()]}</div>
        <div class="day-num">${day.getDate()}</div>
        <div class="day-month">${MONTHS[day.getMonth()]}</div>
        ${di.length ? `<div class="day-count">${di.length} post${di.length!==1?'s':''}</div>` : ''}
      </div>
      <div class="day-posts"></div>
    `;
    cal.appendChild(col);

    const posts = col.querySelector('.day-posts');
    if (!di.length) {
      posts.innerHTML = '<div class="empty-day">·</div>';
    } else {
      di.forEach(item => posts.appendChild(buildCard(item)));
    }
  }

  $('week-summary').textContent = `${total} ${total===1?'post':'posts'} this week`;
}

// ─────────────────────────────────────────────────────────────────
// Build calendar card
// ─────────────────────────────────────────────────────────────────
function buildCard(item) {
  const status = item.productionStatus || item.conceptStatus || item.approvalStatus || 'Pending';
  const colour = sc(status);
  const primary = item.assets[0] || null;

  const card = document.createElement('div');
  card.className = 'item-card';
  card.addEventListener('click', () => openPanel(item.id));

  // Colour bar
  const bar = document.createElement('div');
  bar.className = 'card-bar';
  bar.style.background = colour;
  card.appendChild(bar);

  // Thumbnail
  const thumb = document.createElement('div');
  thumb.className = 'card-thumb';

  if (primary) {
    const ext = getExt(primary);
    const direct = toDirectUrl(primary.url);   // ← Dropbox fix applied here

    if (isImg(ext) && direct) {
      const img = document.createElement('img');
      img.src = direct;
      img.alt = primary.name;
      img.onerror = () => img.style.display = 'none';
      thumb.appendChild(img);

    } else if (isVid(ext) && direct) {
      const vid = document.createElement('video');
      vid.src = direct;
      vid.muted = true; vid.playsInline = true; vid.preload = 'metadata';
      thumb.appendChild(vid);

    } else {
      thumb.innerHTML = fileSVG(22, '#cbd5e1');
    }

    if (item.assets.length > 1) {
      const b = document.createElement('div');
      b.className = 'count-badge';
      b.textContent = '+' + (item.assets.length - 1);
      thumb.appendChild(b);
    }
  } else {
    thumb.innerHTML = imgSVG(22, '#cbd5e1');
  }
  card.appendChild(thumb);

  // Text meta
  const ss = status.length > 15 ? status.slice(0,14)+'…' : status;
  const meta = document.createElement('div');
  meta.className = 'card-meta';
  meta.innerHTML = `
    <div class="card-title">${esc(item.name)}</div>
    <div class="card-footer">
      <span class="card-pill" style="background:${colour}1a;color:${colour}">${esc(ss)}</span>
      ${item.network?.[0] ? `<span class="card-net">${esc(item.network[0])}</span>` : ''}
    </div>
  `;
  card.appendChild(meta);
  return card;
}

// ─────────────────────────────────────────────────────────────────
// Detail panel
// ─────────────────────────────────────────────────────────────────
let currentItemId = null;

async function openPanel(itemId) {
  currentItemId = itemId;
  $('panel-title').textContent = '…';
  $('panel-body').innerHTML = '<div style="padding:20px;text-align:center;color:#94a3b8;font-size:12px"><div class="spinner" style="margin:0 auto 10px"></div>Loading…</div>';
  $('panel-overlay').style.display = 'block';
  $('detail-panel').classList.add('open');

  try {
    const raw = await fetchItemDetail(itemId, colMap);
    if (!raw) throw new Error('Item not found');
    const item = parseItem(raw, colMap);
    renderPanel(item);
  } catch(e) {
    $('panel-body').innerHTML = `<div style="padding:20px;color:#ef4444;font-size:12px">${esc(e.message)}</div>`;
  }
}

function closePanel() {
  $('panel-overlay').style.display = 'none';
  $('detail-panel').classList.remove('open');
  currentItemId = null;
}

function renderPanel(item) {
  $('panel-title').textContent = item.name;
  const body = $('panel-body');
  body.innerHTML = '';

  const cs = item.conceptStatus || '';
  const ps = item.productionStatus || '';
  const as = item.approvalStatus || '';

  // Status badges
  const statuses = [cs, ps, as].filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i);
  if (statuses.length) {
    const bd = el('div','p-badges');
    statuses.forEach(s => {
      const c = sc(s), b = el('span','p-badge');
      b.style.cssText = `background:${c}1a;color:${c};border:1px solid ${c}33`;
      b.textContent = s;
      bd.appendChild(b);
    });
    body.appendChild(bd);
  }

  // Status selects (concept + production)
  if (cs || ps) {
    const row = el('div','status-row');

    if (colMap.conceptCol) {
      const sf = el('div','status-field');
      sf.innerHTML = `<label>Concept Status</label>`;
      const sel = buildStatusSelect(['Pending','Ready For Client Review','Approved','Amends Required','On Hold','Cancelled'], cs);
      sel.addEventListener('change', async () => {
        try { await updateStatus(item.id, colMap.conceptCol, sel.value); }
        catch(e) { console.error(e); }
      });
      sf.appendChild(sel);
      row.appendChild(sf);
    }

    if (colMap.prodCol) {
      const sf = el('div','status-field');
      sf.innerHTML = `<label>Production Status</label>`;
      const sel = buildStatusSelect(['Pending','Ready for Client Review','Approved','Amends Required','In Production','On Hold'], ps);
      sel.addEventListener('change', async () => {
        try { await updateStatus(item.id, colMap.prodCol, sel.value); }
        catch(e) { console.error(e); }
      });
      sf.appendChild(sel);
      row.appendChild(sf);
    }

    body.appendChild(row);
  }

  // Meta grid
  const mg = el('div','p-meta-grid');
  if (item.scheduledDate) {
    const d = new Date(item.scheduledDate);
    mg.appendChild(pmi('Scheduled', d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})));
  }
  if (item.contentType?.[0]) mg.appendChild(pmi('Type', item.contentType[0]));
  if (item.network?.length) {
    const m = pmi('Networks',''); m.classList.add('full');
    const nt = el('div','net-tags');
    item.network.forEach(n => { const t=el('span','net-tag'); t.textContent=n; nt.appendChild(t); });
    m.querySelector('.p-mi-value').appendChild(nt);
    mg.appendChild(m);
  }
  if (mg.children.length) body.appendChild(mg);

  body.appendChild(divider());

  // Concept explanation
  if (item.conceptExplanation) {
    const lbl = el('div','p-section-label'); lbl.textContent='Concept'; body.appendChild(lbl);
    const tb = el('div','p-text-block'); tb.textContent = item.conceptExplanation; body.appendChild(tb);
  }

  // Concept link
  if (item.conceptLink) {
    const lbl = el('div','p-section-label'); lbl.textContent='Concept Link'; body.appendChild(lbl);
    const a = document.createElement('a');
    a.className = 'p-link'; a.href = item.conceptLink;
    a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.textContent = item.conceptLink;
    body.appendChild(a);
    body.appendChild(divider());
  }

  // Assets
  const al = el('div','p-section-label');
  al.textContent = `Assets (${item.assets.length})`;
  body.appendChild(al);

  if (item.assets.length) {
    const ag = el('div','asset-grid');
    item.assets.forEach(a => ag.appendChild(buildAssetCard(a)));
    body.appendChild(ag);
  } else {
    const na = el('div','no-assets');
    na.textContent = 'No assets attached';
    body.appendChild(na);
  }

  // Copy
  if (item.pushCopy) {
    body.appendChild(divider());
    const cl = el('div','p-section-label'); cl.textContent='Copy'; body.appendChild(cl);
    const cb = el('div','p-text-block'); cb.textContent = item.pushCopy; body.appendChild(cb);
  }

  body.appendChild(divider());

  // Comments
  const coml = el('div','p-section-label');
  coml.textContent = `Comments (${item.updates.length})`;
  body.appendChild(coml);

  // Comment input
  const cf = el('div','comment-form');
  const ta = document.createElement('textarea');
  ta.rows = 3; ta.placeholder = 'Add a comment…';
  cf.appendChild(ta);
  const cs2 = el('div','comment-submit');
  const sb = document.createElement('button');
  sb.className = 'submit-btn'; sb.textContent = 'Post Comment';
  sb.addEventListener('click', async () => {
    const txt = ta.value.trim();
    if (!txt) return;
    sb.disabled = true; sb.textContent = 'Posting…';
    try {
      await postComment(item.id, txt);
      ta.value = '';
      // Reload panel to show new comment
      await openPanel(item.id);
    } catch(e) {
      console.error(e);
      sb.disabled = false; sb.textContent = 'Post Comment';
    }
  });
  cs2.appendChild(sb);
  cf.appendChild(cs2);
  body.appendChild(cf);

  if (item.updates.length) {
    item.updates.forEach(u => {
      const ci = el('div','comment-item');
      const d = new Date(u.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'numeric',minute:'2-digit'});
      ci.innerHTML = `
        <div class="comment-header">
          <span class="comment-author">${esc(u.creator?.name||'Unknown')}</span>
          <span class="comment-date">${esc(d)}</span>
        </div>
        <div class="comment-body">${esc(u.text_body||'')}</div>
      `;
      body.appendChild(ci);
    });
  } else {
    const nc = el('div','no-comments'); nc.textContent='No comments yet'; body.appendChild(nc);
  }
}

// ─────────────────────────────────────────────────────────────────
// Asset card in panel
// ─────────────────────────────────────────────────────────────────
function buildAssetCard(asset) {
  const ext = getExt(asset);
  const direct = toDirectUrl(asset.url);   // ← Dropbox fix applied here

  const card = el('div','asset-card');
  card.addEventListener('click', () => openLightbox(asset));

  const wrap = el('div','asset-thumb');

  if (isImg(ext) && direct) {
    const img = document.createElement('img');
    img.src = direct; img.alt = asset.name;
    img.onerror = () => img.style.display = 'none';
    wrap.appendChild(img);

  } else if (isVid(ext) && direct) {
    const vid = document.createElement('video');
    vid.src = direct; vid.muted=true; vid.playsInline=true; vid.preload='metadata';
    wrap.appendChild(vid);

  } else {
    wrap.innerHTML = fileSVG(28, '#cbd5e1');
  }

  card.appendChild(wrap);
  const info = el('div','asset-info');
  info.innerHTML = `<div class="asset-name">${esc(asset.name)}</div><div class="asset-ext">${esc(ext||'file')}</div>`;
  card.appendChild(info);
  return card;
}

// ─────────────────────────────────────────────────────────────────
// Lightbox
// ─────────────────────────────────────────────────────────────────
function openLightbox(asset) {
  const ext = getExt(asset);
  const direct = toDirectUrl(asset.url);   // ← Dropbox fix applied here

  $('lb-filename').textContent = asset.name;
  $('lb-open').href = asset.url;
  const media = $('lb-media');
  media.innerHTML = '';

  if (isImg(ext) && direct) {
    const img = document.createElement('img');
    img.src = direct; img.alt = asset.name;
    media.appendChild(img);

  } else if (isVid(ext) && direct) {
    const vid = document.createElement('video');
    vid.src = direct; vid.controls=true; vid.autoplay=true;
    media.appendChild(vid);

  } else {
    media.innerHTML = `<div style="padding:40px;text-align:center;color:#64748b">
      ${fileSVG(40,'#64748b')}
      <p style="margin-top:12px;font-size:13px">No preview — <a href="${esc(asset.url)}" target="_blank" style="color:#3b82f6">open file ↗</a></p>
    </div>`;
  }

  $('lightbox').classList.add('open');
}

function closeLightbox() {
  const v = document.querySelector('#lb-media video');
  if (v) { v.pause(); v.src=''; }
  $('lightbox').classList.remove('open');
}

// ─────────────────────────────────────────────────────────────────
// Small DOM helpers
// ─────────────────────────────────────────────────────────────────
function el(tag, cls) { const e=document.createElement(tag); if(cls)e.className=cls; return e; }
function divider() { return el('div','p-divider'); }
function pmi(label, value) {
  const e = el('div','p-mi');
  e.innerHTML = `<div class="p-mi-label">${esc(label)}</div><div class="p-mi-value">${esc(String(value))}</div>`;
  return e;
}
function buildStatusSelect(options, current) {
  const sel = document.createElement('select');
  options.forEach(o => { const opt=new Option(o,o); sel.appendChild(opt); });
  sel.value = current || '';
  return sel;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fileSVG(s,c) { return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`; }
function imgSVG(s,c) { return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`; }

// ─────────────────────────────────────────────────────────────────
// Events
// ─────────────────────────────────────────────────────────────────
$('btn-prev').addEventListener('click',    () => { weekStart.setDate(weekStart.getDate()-7); renderCalendar(); });
$('btn-next').addEventListener('click',    () => { weekStart.setDate(weekStart.getDate()+7); renderCalendar(); });
$('btn-today').addEventListener('click',   () => { weekStart=getWeekStart(); renderCalendar(); });
$('btn-refresh').addEventListener('click', () => { $('app').style.display='none'; $('loading-screen').style.display='flex'; boot(); });
$('panel-close').addEventListener('click', closePanel);
$('panel-overlay').addEventListener('click', closePanel);
$('lb-close').addEventListener('click', closeLightbox);
$('lightbox').addEventListener('click', e => { if(e.target===$('lightbox')) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (e.key==='Escape') {
    if ($('lightbox').classList.contains('open')) closeLightbox();
    else closePanel();
  }
});

// ─────────────────────────────────────────────────────────────────
// Go
// ─────────────────────────────────────────────────────────────────
boot();
</script>
