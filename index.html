<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: #f1f5f9; color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Loading & error */
#loading-screen { position: fixed; inset: 0; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 900; }
.spinner { width: 26px; height: 26px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#error-screen { position: fixed; inset: 0; background: #f8fafc; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 40px; text-align: center; }
#error-screen h2 { font-size: 16px; font-weight: 700; }
#error-screen p { font-size: 12px; color: #64748b; max-width: 440px; line-height: 1.5; }
#error-screen code { font-size: 11px; color: #ef4444; background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 8px 12px; max-width: 440px; word-break: break-all; display: block; }
.retry-btn { height: 32px; padding: 0 16px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 4px; }

/* App */
#app { display: none; flex-direction: column; height: 100vh; }
#header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
#header h1 { font-size: 15px; font-weight: 700; color: #0f172a; }
#header p { font-size: 10px; color: #94a3b8; margin-top: 1px; }
#nav { display: flex; align-items: center; gap: 6px; }
.nav-btn { width: 26px; height: 26px; border: 1px solid #e2e8f0; border-radius: 5px; background: #fff; cursor: pointer; font-size: 16px; color: #64748b; display: flex; align-items: center; justify-content: center; }
.nav-btn:hover { background: #f8fafc; }
#week-label { font-size: 12px; font-weight: 600; color: #1e293b; min-width: 180px; text-align: center; }
.hbtn { height: 26px; padding: 0 10px; border: 1px solid #e2e8f0; border-radius: 5px; background: #fff; cursor: pointer; font-size: 11px; font-weight: 500; color: #475569; font-family: inherit; }
.hbtn:hover { background: #f8fafc; }

/* Calendar wrapper */
#cal-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Day header row */
#cal-head { display: flex; flex-shrink: 0; background: #fff; border-bottom: 2px solid #e2e8f0; z-index: 20; }
.ch-gutter { width: 56px; flex-shrink: 0; border-right: 1px solid #e2e8f0; }
.ch-day { flex: 1; padding: 7px 6px; text-align: center; border-right: 1px solid #f1f5f9; }
.ch-day:last-child { border-right: none; }
.ch-dayname { font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .7px; }
.ch-daynum { font-size: 20px; font-weight: 700; color: #1e293b; line-height: 1.1; margin-top: 1px; }
.ch-day.today .ch-dayname { color: #3b82f6; }
.ch-day.today .ch-daynum { color: #3b82f6; }
.ch-daycount { font-size: 9px; color: #94a3b8; margin-top: 1px; }
.ch-day.today .ch-daycount { color: #3b82f6; }

/* Scrollable time body */
#cal-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
#cal-grid {
  display: flex; position: relative;
  background-image: repeating-linear-gradient(to bottom, transparent 0, transparent 63px, #f1f5f9 63px, #f1f5f9 64px);
  background-position: 56px 0;
  background-size: calc(100% - 56px) 64px;
}

/* Time gutter */
#time-gutter { width: 56px; flex-shrink: 0; position: relative; border-right: 1px solid #e2e8f0; }
.tl { position: absolute; right: 7px; font-size: 9px; font-weight: 500; color: #94a3b8; transform: translateY(-50%); white-space: nowrap; }

/* Current time line */
#now-bar { position: absolute; left: 0; right: 0; height: 2px; background: #ef4444; z-index: 15; pointer-events: none; display: none; }
#now-bar::before { content: ''; position: absolute; left: -1px; top: -4px; width: 9px; height: 9px; background: #ef4444; border-radius: 50%; }

/* Day columns */
#days-grid { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); position: relative; }
.day-col { position: relative; border-right: 1px solid #f1f5f9; }
.day-col:last-child { border-right: none; }
.day-col.today { background: rgba(59,130,246,.02); }

/* ═══ CALENDAR EVENT CARD ═══ */
.cal-ev {
  position: absolute; left: 3px; right: 3px;
  background: #fff; border: 1px solid #e2e8f0; border-radius: 7px;
  overflow: hidden; cursor: pointer; z-index: 5;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  transition: box-shadow .15s, transform .1s;
  display: flex; flex-direction: column;
  min-height: 60px;
}
.cal-ev:hover { box-shadow: 0 4px 14px rgba(0,0,0,.1); transform: translateY(-1px); z-index: 10; }
.cal-ev-bar { height: 3px; flex-shrink: 0; }

/* Thumbnail on card */
.cal-ev-thumb {
  width: 100%;
  aspect-ratio: 4/3;
  background: #f1f5f9;
  overflow: hidden;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.cal-ev-thumb img, .cal-ev-thumb video { width: 100%; height: 100%; object-fit: cover; display: block; }
.cal-ev-thumb .no-thumb { color: #d1d5db; }

.cal-ev-body { padding: 4px 6px 5px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
.cal-ev-toprow { display: flex; align-items: center; justify-content: space-between; gap: 3px; }
.cal-ev-time { font-size: 9px; font-weight: 600; color: #64748b; }
.cal-ev-type { font-size: 8px; color: #94a3b8; text-transform: uppercase; }
.cal-ev-title { font-size: 10px; font-weight: 600; color: #1e293b; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.cal-ev-status { font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; letter-spacing: .3px; align-self: flex-start; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cal-ev-nets { display: flex; flex-wrap: wrap; gap: 2px; }
.cal-ev-net { font-size: 8px; background: #f1f5f9; color: #64748b; padding: 1px 4px; border-radius: 3px; }

/* ═══ DETAIL PANEL ═══ */
#panel-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.2); z-index: 500; }
#panel { position: fixed; top: 0; right: -480px; bottom: 0; width: 460px; background: #fff; box-shadow: -6px 0 28px rgba(0,0,0,.1); z-index: 501; display: flex; flex-direction: column; transition: right .22s cubic-bezier(.4,0,.2,1); overflow: hidden; }
#panel.open { right: 0; }
#panel-head { padding: 16px 20px 12px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; flex-shrink: 0; }
#panel-title { font-size: 16px; font-weight: 700; color: #0f172a; line-height: 1.3; }
#panel-x { background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 20px; line-height: 1; padding: 0; flex-shrink: 0; }
#panel-x:hover { color: #475569; }
#panel-body { flex: 1; overflow-y: auto; padding: 16px 20px 28px; }
#panel-body::-webkit-scrollbar { width: 4px; }
#panel-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }

/* Panel asset preview */
.p-preview { width: 100%; background: #0f172a; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; min-height: 120px; }
.p-preview img { width: 100%; height: auto; max-height: 320px; object-fit: contain; display: block; }
.p-preview video { width: 100%; max-height: 320px; display: block; }
.p-preview-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 40px; background: #f8fafc; border-radius: 8px; margin-bottom: 16px; }
.p-preview-empty p { font-size: 12px; color: #94a3b8; }

/* Multiple assets grid */

.p-asset-card { border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; cursor: pointer; transition: border-color .15s; }

.p-asset-thumb { aspect-ratio: 16/9; background: #f1f5f9; overflow: hidden; display: flex; align-items: center; justify-content: center; }

.p-asset-ext { font-size: 9px; color: #94a3b8; text-transform: uppercase; margin-top: 1px; }

/* Status selects — auto-fills any number of columns */

.p-field label { display: block; font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }

.comment-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.comment-author { font-size: 11px; font-weight: 600; color: #0f172a; }
.comment-date { font-size: 10px; color: #94a3b8; }
.comment-body { font-size: 12px; color: #334155; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
.comment-reply-btn { font-size: 10px; color: #94a3b8; background: none; border: none; cursor: pointer; padding: 4px 0 0; font-family: inherit; }
.comment-reply-btn:hover { color: #3b82f6; }
.replies-list { margin-top: 8px; padding-top: 8px; border-top: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 7px; }
.reply-item { background: #fff; border-radius: 5px; padding: 7px 9px; border: 1px solid #f1f5f9; }
.reply-form { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #e2e8f0; display: none; }
.reply-form.open { display: block; }
.reply-form textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 5px; padding: 7px 9px; font-size: 11px; font-family: inherit; resize: none; outline: none; line-height: 1.5; }
.reply-form textarea:focus { border-color: #3b82f6; }
.reply-form-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 5px; }
.reply-btn { height: 26px; padding: 0 10px; background: #3b82f6; color: #fff; border: none; border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; }
.reply-btn:disabled { background: #93c5fd; cursor: not-allowed; }
.reply-cancel { height: 26px; padding: 0 10px; background: none; border: 1px solid #e2e8f0; border-radius: 5px; font-size: 11px; color: #64748b; cursor: pointer; font-family: inherit; }
.no-comments { text-align: center; padding: 16px; font-size: 12px; color: #94a3b8; background: #f8fafc; border-radius: 6px; }

/* Lightbox */
#lightbox { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.92); align-items: center; justify-content: center; padding: 20px; }
#lightbox.open { display: flex; }
#lb-inner { max-width: 920px; width: 100%; background: #111; border-radius: 10px; overflow: hidden; }
#lb-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #1e1e1e; }
#lb-name { font-size: 12px; color: #e2e8f0; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-btns { display: flex; gap: 6px; flex-shrink: 0; margin-left: 12px; }
.lb-btn { font-size: 11px; color: #94a3b8; background: none; border: 1px solid #2a2a2a; border-radius: 5px; padding: 3px 9px; cursor: pointer; text-decoration: none; font-family: inherit; }
.lb-btn:hover { color: #e2e8f0; border-color: #444; }
#lb-media { background: #000; min-height: 200px; max-height: 72vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
#lb-media img, #lb-media video { max-width: 100%; max-height: 72vh; object-fit: contain; display: block; }
</style>

<script>
'use strict';
const $ = id => document.getElementById(id);

// ─────────────────────────────────────────────────────────
// CALENDAR CONSTANTS
// ─────────────────────────────────────────────────────────
const HOUR_H  = 64;
const START_H = 6;
const END_H   = 23;
const TOTAL_H = (END_H - START_H) * HOUR_H;
const DAYS    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ─────────────────────────────────────────────────────────
// TIMEZONE — monday stores time in UTC, we display in Sydney
// ─────────────────────────────────────────────────────────
function parseDateTime(val) {
  // monday date column returns: {"date":"2026-04-22","time":"23:00:00","changed_at":"..."}
  // The DATE is the user's local date (Sydney).
  // The TIME is UTC — must be converted to display timezone.
  if (!val) return {};
  try {
    const p = JSON.parse(val);
    if (!p.date) return {};

    let hour = null, min = null;

    if (p.time) {
      // Build a UTC Date using a neutral date so DST is computed correctly for the timezone
      const utcDt = new Date('2000-06-15T' + p.time + 'Z');

      // Convert to display timezone
      try {
        const hStr = utcDt.toLocaleString('en-US', { timeZone: CONFIG.timezone, hour: 'numeric', hour12: false });
        const mStr = utcDt.toLocaleString('en-US', { timeZone: CONFIG.timezone, minute: '2-digit' });
        hour = parseInt(hStr) % 24;   // Intl can return "24" at midnight
        min  = parseInt(mStr);
      } catch {
        // Fallback: just use the raw UTC hour (better than nothing)
        hour = parseInt(p.time.split(':')[0]);
        min  = parseInt(p.time.split(':')[1]);
      }
    }

    return {
      date:    p.date,                          // Sydney local date from monday
      hour,                                     // Converted to display timezone
      min,
      dateObj: new Date(p.date + 'T00:00:00'),  // For day-column matching
    };
  } catch { return {}; }
}

function fmt12(hour, min) {
  if (hour === null || hour === undefined) return '';
  const h  = hour % 12 || 12;
  const m  = String(min || 0).padStart(2, '0');
  const ap = hour < 12 ? 'AM' : 'PM';
  return `${h}:${m} ${ap}`;
}

function timeToY(hour, min) {
  if (hour === null || hour === undefined) return 0;
  return Math.max(0, ((hour + (min || 0) / 60) - START_H) * HOUR_H);
}

// ─────────────────────────────────────────────────────────
// DROPBOX URL → DIRECT URL
// Handles /s/ links AND newer /scl/fi/ links with rlkey
// ─────────────────────────────────────────────────────────
function toDirectUrl(url) {
  if (!url || typeof url !== 'string') return null;
  const u = url.trim();
  if (!u.startsWith('http')) return null;
  if (!u.includes('dropbox.com')) return u;

  let out = u;
  out = out.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
  // Remove dl=0 or dl=1, keeping rlkey and other params
  out = out.replace(/([?&])dl=\d(&|$)/, (_, pre, post) => (post === '&' ? pre : ''));
  out = out.replace(/[?&]$/, '');
  return out;
}

// ─────────────────────────────────────────────────────────
// FILE TYPE DETECTION
// Checks both asset.extension and the URL path
// ─────────────────────────────────────────────────────────
function getExt(asset) {
  if (asset.extension) return asset.extension.toLowerCase().replace('.', '');
  return (asset.url || '').split('?')[0].split('.').pop().toLowerCase();
}
const IMG_RE = /^(jpg|jpeg|png|gif|webp|svg|bmp|tiff|heic)$/;
const VID_RE = /^(mp4|webm|mov|avi|mkv|m4v|wmv|m4v)$/;
function assetType(asset) {
  const ext  = getExt(asset);
  const path = (asset.url || '').split('?')[0].toLowerCase();
  const img  = IMG_RE.test(ext) || IMG_RE.test(path.split('.').pop());
  const vid  = VID_RE.test(ext) || VID_RE.test(path.split('.').pop());
  return { img, vid };
}

// ─────────────────────────────────────────────────────────
// NORMALISE ASSETS — handles all shapes monday might return
// ─────────────────────────────────────────────────────────
function normaliseAssets(raw) {
  if (!raw) return [];
  const wrap = (x, i) => {
    if (!x) return null;
    if (typeof x === 'string') {
      const u = x.trim();
      if (!u.startsWith('http')) return null;
      return { id: 's' + i, name: u.split('/').pop()?.split('?')[0] || 'File', url: u, extension: (u.split('?')[0].split('.').pop() || '') };
    }
    const url = [x.url, x.linkUrl, x.link, x.publicUrl, x.public_url, x.shareUrl, x.downloadUrl]
      .map(v => (typeof v === 'string' ? v.trim() : ''))
      .find(v => v && v.startsWith('http')) || '';
    if (!url) return null;
    return {
      id:  x.id ? String(x.id) : 'a' + i,
      name: x.name || url.split('/').pop()?.split('?')[0] || 'File',
      url,
      extension: x.extension || x.file_extension || (url.split('?')[0].split('.').pop() || ''),
    };
  };
  return (Array.isArray(raw) ? raw : [raw]).map(wrap).filter(Boolean);
}

// ─────────────────────────────────────────────────────────
// EXTRACT FILES FROM A COLUMN VALUE STRING
// (the actual parsing logic used by parseItem)
// ─────────────────────────────────────────────────────────
function extractFilesFromColVal(val, colId, itemName) {
  if (!val) return [];
  try {
    const p = JSON.parse(val);

    // Standard Files column: {"files":[...]}
    if (p.files && Array.isArray(p.files)) {
      const files = p.files.flatMap((f, i) => {
        // Try every known URL property
        // NOTE: monday's native Dropbox integration uses "linkToFile"
        const url = [f.linkToFile, f.url, f.linkUrl, f.link, f.publicUrl, f.public_url, f.shareUrl, f.src, f.href]
          .map(v => (typeof v === 'string' ? v.trim() : ''))
          .find(v => v && v.startsWith('http'));
        if (!url) {
          console.warn(`[FILES] No URL in entry [${colId}][${i}] for "${itemName}":`, JSON.stringify(f));
          return [];
        }
        return [{ id: f.assetId ? String(f.assetId) : 'f' + i, name: f.name || url.split('/').pop()?.split('?')[0] || 'File', url, extension: (f.name || url.split('?')[0]).split('.').pop() || '' }];
      });
      if (files.length) return files;
    }

    // Link column: {"url":"https://...","text":"..."}
    if (p.url && typeof p.url === 'string' && p.url.startsWith('http')) {
      return [{ id: 'link0', name: p.text || p.url.split('/').pop()?.split('?')[0] || 'File', url: p.url, extension: (p.url.split('?')[0].split('.').pop() || '') }];
    }

  } catch (e) {
    console.warn(`[FILES] Parse error [${colId}] for "${itemName}":`, e);
  }
  return [];
}

function cleanGroupTitle(t) {
  // "5. Asset For Approval" → "Asset For Approval"
  // "8.1 Scheduled" → "Scheduled"
  return (t || '').replace(/^[\d\.]+[\s\.\)\-]+/, '').trim();
}

function getDisplayStatus(item) {
  const ps = (item.productionStatus || '').trim();
  const cs = (item.conceptStatus   || '').trim();

  if (/ready for client review/i.test(ps)) return 'Asset Ready for Review';
  if (/ready for client review/i.test(cs)) return 'Concept Ready for Review';
  if (/approved/i.test(ps))                return 'Asset Approved';
  if (/approved/i.test(cs))                return 'Concept Approved';
  if (/amend|change/i.test(ps))            return 'Amends Required';
  if (/amend|change/i.test(cs))            return 'Concept Amends';
  if (ps && !/pending/i.test(ps))          return ps;
  if (cs && !/pending/i.test(cs))          return cs;

  const g = cleanGroupTitle(item.groupTitle);
  return g || 'Pending';
}

function autoMap(cols) {
  const find = fn => { const c = cols.find(fn); return c ? c.id : ''; };
  return {
    dateCol:       find(c => c.type === 'date'),
    filesCol:      find(c => c.type === 'file') || find(c => /final.asset|asset|attachment|file/i.test(c.title)),
    conceptCol:    find(c => /concept.*status|concept/i.test(c.title) && c.type === 'color'),
    prodCol:       find(c => /production.*status|production/i.test(c.title) && c.type === 'color'),
    copyStatusCol: find(c => /copy.*status|copy.*approv/i.test(c.title) && c.type === 'color'),
    typeCol:       find(c => /content.?type/i.test(c.title)),
    netCol:        find(c => /network|platform/i.test(c.title)),
    copyCol:       find(c => /push.?copy|^copy$|caption/i.test(c.title)),
    explCol:       find(c => /explanation/i.test(c.title)),
    linkCol:       find(c => /concept.*link/i.test(c.title) || (c.type === 'link' && /link/i.test(c.title))),
    estCol:        find(c => /estimate/i.test(c.title)),
  };
}

// ─────────────────────────────────────────────────────────
// PARSE RAW ITEM FROM API
// ─────────────────────────────────────────────────────────
function parseItem(raw, colMap) {
  const out = {
    id: raw.id, name: raw.name,
    groupTitle: raw.group?.title || '',
    assets: normaliseAssets(raw.assets),
    scheduledDate: null, scheduledDateObj: null,
    scheduledHour: null, scheduledMin: null, scheduledTimeStr: '',
    conceptStatus: '', productionStatus: '', copyStatus: '',
    contentType: [], network: [],
    pushCopy: '', conceptExpl: '', conceptLink: '', conceptEst: '',
    updates: raw.updates || [],
    _rawCols: [],   // saved for debug
  };

  const cv = raw.column_values || [];
  out._rawCols = cv;

  cv.forEach(col => {
    const val  = col.value;
    const text = (col.text || '').trim();

    if (col.id === colMap.dateCol && val) {
      const dt = parseDateTime(val);
      out.scheduledDate    = dt.date;
      out.scheduledDateObj = dt.dateObj;
      out.scheduledHour    = dt.hour;
      out.scheduledMin     = dt.min;
      out.scheduledTimeStr = fmt12(dt.hour, dt.min);
    }

    if (col.id === colMap.conceptCol)    out.conceptStatus    = text;
    if (col.id === colMap.prodCol)       out.productionStatus = text;
    if (col.id === colMap.copyStatusCol) out.copyStatus       = text;
    if (col.id === colMap.copyCol)       out.pushCopy         = text;
    if (col.id === colMap.explCol)     out.conceptExpl      = text;
    if (col.id === colMap.estCol)      out.conceptEst       = text;

    if (col.id === colMap.typeCol && text) out.contentType = text.split(', ').filter(Boolean);
    if (col.id === colMap.netCol  && text) out.network     = text.split(', ').filter(Boolean);

    if (col.id === colMap.linkCol && val) {
      try { const p = JSON.parse(val); out.conceptLink = p.url || p.text || text; }
      catch { out.conceptLink = text; }
    }

    // ── Files / Dropbox column ───────────────────────────
    if (col.id === colMap.filesCol) {
      console.log(`[FILES COL raw] "${raw.name}" col="${col.id}"`, val ? val.slice(0, 300) : '(empty)');
      const files = extractFilesFromColVal(val, col.id, raw.name);
      if (files.length) {
        console.log(`[FILES resolved] "${raw.name}"`, files);
        out.assets = files;
      }
    }
  });

  // ── Fallback 1: scan ALL columns for any files-like data ──
  if (!out.assets.length) {
    for (const col of cv) {
      if (col.id === colMap.filesCol || !col.value) continue;
      const files = extractFilesFromColVal(col.value, col.id, raw.name);
      if (files.length) {
        console.log(`[FILES fallback col="${col.id}"] "${raw.name}"`, files);
        out.assets = files;
        break;
      }
    }
  }

  // ── Fallback 2: item-level assets (uploaded files) ────────
  if (!out.assets.length && raw.assets?.length) {
    out.assets = normaliseAssets(raw.assets);
    console.log(`[FILES item-assets] "${raw.name}"`, out.assets);
  }

  if (!out.assets.length) {
    console.warn(`[FILES] No assets found for "${raw.name}". filesCol="${colMap.filesCol}"`);
    console.log(`[FILES debug] All column values:`, cv.map(c => ({ id: c.id, value: (c.value || '').slice(0, 100) })));
  }

  return out;
}

// ─────────────────────────────────────────────────────────
// monday.com API
// ─────────────────────────────────────────────────────────
async function api(query) {
  const r = await fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': CONFIG.apiToken, 'API-Version': '2024-01' },
    body: JSON.stringify({ query }),
  });
  if (!r.ok) throw new Error(`monday.com HTTP ${r.status} — check your API token`);
  const j = await r.json();
  if (j.errors?.length) throw new Error(j.errors[0].message);
  return j.data;
}

async function fetchColumns() {
  const d = await api(`{ boards(ids:[${CONFIG.boardId}]) { columns { id title type } } }`);
  const cols = d?.boards?.[0]?.columns;
  if (!cols?.length) throw new Error('Board not found — check your board ID');
  return cols;
}

async function fetchItems(colMap) {
  const ids = JSON.stringify([...new Set(Object.values(colMap).filter(Boolean))]);
  const d = await api(`{
    boards(ids:[${CONFIG.boardId}]) {
      items_page(limit:500) {
        items {
          id name
          group { id title color }
          assets { id name url public_url file_extension }
          column_values(ids:${ids}) { id value text }
        }
      }
    }
  }`);
  return d?.boards?.[0]?.items_page?.items || [];
}

async function fetchDetail(itemId, colMap) {
  const d = await api(`{
    items(ids:[${itemId}]) {
      id name
      group { id title color }
      assets { id name url public_url file_extension }
      updates(limit:50) {
        id text_body created_at

        replies {
          id text_body created_at
          creator { id name }
        }

      column_values { id value text }

  return d?.items?.[0] || null;

let allItems = [], weekStart = getWeekStart(), colMap = null;

function getWeekStart(d) {
  const x = new Date(d || new Date());
  x.setDate(x.getDate() - x.getDay());
  x.setHours(0, 0, 0, 0);
  return x;
}
const sameDay = (a, b) => a.toDateString() === b.toDateString();

// BOOT
// ─────────────────────────────────────────────────────────
async function boot() {
  if (!CONFIG.apiToken || CONFIG.apiToken === 'YOUR_API_TOKEN_HERE')
    return showError('API token not set', 'Open this file in a text editor and paste your token into the CONFIG block at the top.');
  if (!CONFIG.boardId || CONFIG.boardId === 'YOUR_BOARD_ID_HERE')
    return showError('Board ID not set', 'Open this file and paste your board ID into the CONFIG block at the top.');

  try {
    setMsg('Loading board columns…');
    const cols = await fetchColumns();
    allBoardCols = cols;
    console.log('[columns]', cols);

    colMap = loadMap() || autoMap(cols);
    saveMap(colMap);
    console.log('[colMap]', colMap);

    setMsg('Loading content…');
    const raw = await fetchItems(colMap);
    allItems = raw.map(r => parseItem(r, colMap)).filter(i => i.scheduledDate);
    console.log(`[boot] ${allItems.length} items with dates`);

    $('loading-screen').style.display = 'none';
    $('app').style.display = 'flex';
    renderCalendar();
    // No auto-scroll — user can click Today to jump to now
  } catch (e) {
    console.error(e);

  }
}

// ─────────────────────────────────────────────────────────
// RENDER CALENDAR
// ─────────────────────────────────────────────────────────
function renderCalendar() {
  const today = new Date();
  const days  = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    return d;
  });

  // Week label
  const last = days[6];
  const sm   = weekStart.getMonth() === last.getMonth();
  $('week-label').textContent = sm
    ? `${weekStart.getDate()} ${MONTHS[weekStart.getMonth()]} – ${last.getDate()}, ${last.getFullYear()}`
    : `${weekStart.getDate()} ${MONTHS[weekStart.getMonth()]} – ${last.getDate()} ${MONTHS[last.getMonth()]} ${last.getFullYear()}`;

  // Day headers
  const hdr = $('cal-head');
  while (hdr.children.length > 1) hdr.removeChild(hdr.lastChild);
  let total = 0;
  days.forEach(day => {
    const items = allItems.filter(x => x.scheduledDateObj && sameDay(x.scheduledDateObj, day));
    total += items.length;
    const isTd = sameDay(day, today);
    const div  = document.createElement('div');
    div.className = 'ch-day' + (isTd ? ' today' : '');
    div.innerHTML = `
      <div class="ch-dayname">${DAYS[day.getDay()]}</div>
      <div class="ch-daynum">${day.getDate()}</div>
      ${items.length ? `<div class="ch-daycount">${items.length} post${items.length !== 1 ? 's' : ''}</div>` : ''}
    `;
    hdr.appendChild(div);
  });
  $('week-summary').textContent = `${total} ${total === 1 ? 'post' : 'posts'} this week`;

  // Time gutter
  const tg = $('time-gutter');
  tg.innerHTML = '';
  tg.style.minHeight = TOTAL_H + 'px';
  for (let h = START_H; h <= END_H; h++) {
    const lbl = document.createElement('div');
    lbl.className = 'tl';
    lbl.style.top = ((h - START_H) * HOUR_H) + 'px';
    const h12 = h % 12 || 12;
    lbl.textContent = `${h12}${h < 12 ? 'am' : 'pm'}`;
    tg.appendChild(lbl);
  }

  // Day columns
  const dg = $('days-grid');
  dg.innerHTML = '';
  dg.style.minHeight = TOTAL_H + 'px';
  days.forEach(day => {
    const isTd     = sameDay(day, today);
    const dc       = document.createElement('div');
    dc.className   = 'day-col' + (isTd ? ' today' : '');
    dc.style.minHeight = TOTAL_H + 'px';
    allItems.filter(x => x.scheduledDateObj && sameDay(x.scheduledDateObj, day))
            .forEach(item => dc.appendChild(buildCalEvent(item)));
    dg.appendChild(dc);
  });

  // Now line
  const nb = $('now-bar');
  if (days.some(d => sameDay(d, today))) {
    const now = new Date();
    const y   = timeToY(now.getHours(), now.getMinutes());
    nb.style.display = 'block';
    nb.style.top     = y + 'px';
    nb.style.left    = '56px';
  } else {
    nb.style.display = 'none';
  }
}

function scrollToNow() {
  const scroll = $('cal-scroll');
  const now    = new Date();
  const y      = timeToY(now.getHours(), now.getMinutes());
  setTimeout(() => { scroll.scrollTop = Math.max(0, y - scroll.clientHeight / 3); }, 120);
}

// ─────────────────────────────────────────────────────────
// BUILD CALENDAR EVENT BLOCK
// ─────────────────────────────────────────────────────────
function buildCalEvent(item) {
  const status = getDisplayStatus(item);
  const colour = statusColour(status);
  const primary = item.assets[0] || null;
  const y = timeToY(item.scheduledHour, item.scheduledMin);

  const ev = document.createElement('div');
  ev.className = 'cal-ev';
  ev.style.top = y + 'px';
  ev.addEventListener('click', () => openPanel(item.id));

  // Colour bar
  const bar = document.createElement('div');
  bar.className = 'cal-ev-bar';
  bar.style.background = colour;
  ev.appendChild(bar);

  // Thumbnail
  const tw = document.createElement('div');
  tw.className = 'cal-ev-thumb';
  if (primary) {
    renderMedia(primary, tw, false);
  } else {
    tw.innerHTML = `<div class="no-thumb">${svgFile(20,'#d1d5db')}</div>`;
  }
  ev.appendChild(tw);

  // Body text
  const body = document.createElement('div');
  body.className = 'cal-ev-body';

  // Time + type row
  if (item.scheduledTimeStr || item.contentType?.[0]) {
    const tr = document.createElement('div');
    tr.className = 'cal-ev-toprow';
    if (item.scheduledTimeStr) { const t = document.createElement('div'); t.className='cal-ev-time'; t.textContent=item.scheduledTimeStr; tr.appendChild(t); }
    if (item.contentType?.[0])  { const t = document.createElement('div'); t.className='cal-ev-type';  t.textContent=item.contentType[0];  tr.appendChild(t); }
    body.appendChild(tr);
  }

  const title = document.createElement('div');
  title.className = 'cal-ev-title';
  title.textContent = item.name;
  body.appendChild(title);

  const pill = document.createElement('div');
  pill.className = 'cal-ev-status';
  pill.style.cssText = `background:${colour}1a;color:${colour};`;
  pill.textContent = status;
  body.appendChild(pill);

  if (item.network?.length) {
    const nets = document.createElement('div');
    nets.className = 'cal-ev-nets';
    item.network.slice(0, 3).forEach(n => {
      const t = document.createElement('span'); t.className='cal-ev-net'; t.textContent=n; nets.appendChild(t);
    });
    body.appendChild(nets);
  }

  ev.appendChild(body);
  return ev;
}

// ─────────────────────────────────────────────────────────
// RENDER MEDIA ELEMENT (img, video, or placeholder)
// toDirectUrl is always applied here for Dropbox
// ─────────────────────────────────────────────────────────
function renderMedia(asset, container, fullSize) {
  const direct = toDirectUrl(asset.url);
  const { img, vid } = assetType(asset);

  console.log(`[renderMedia] "${asset.name}" img:${img} vid:${vid} direct:${direct}`);

  if (img && direct) {
    const el = document.createElement('img');
    el.src = direct; el.alt = asset.name;
    el.onerror = () => { console.warn('[renderMedia] img failed:', direct); el.style.display='none'; };
    container.appendChild(el);

  } else if (vid && direct) {
    const el = document.createElement('video');
    el.muted = true; el.playsInline = true; el.preload = 'metadata';
    el.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    if (fullSize) {
      el.controls = true;
      el.muted = false;
      el.src = direct;
    } else {
      // Thumbnail: seek to 1s after metadata to render a visible frame
      el.addEventListener('loadedmetadata', () => { el.currentTime = 1; }, { once: true });
      el.addEventListener('error', () => { try { el.currentTime = 0; } catch {} }, { once: true });
      el.src = direct;
    }
    container.appendChild(el);

  } else {
    container.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:100%;height:100%;padding:10px;">
        ${svgFile(fullSize ? 36 : 22, '#94a3b8')}
        <span style="font-size:${fullSize?'11px':'8px'};color:#94a3b8;text-transform:uppercase;letter-spacing:.5px">${esc(getExt(asset)||'file')}</span>
        ${fullSize && direct ? `<a href="${esc(asset.url)}" target="_blank" rel="noopener noreferrer" style="font-size:11px;color:#3b82f6;text-decoration:none">Open file ↗</a>` : ''}
      </div>`;
  }
}

function renderPanel(item) {
  $('panel-title').textContent = item.name;
  const pb = $('panel-body');
  pb.innerHTML = '';

  // ── Asset preview ──────────────────────────────────────
  if (item.assets.length) {
    const lbl = el('div', 'p-sec-label');
    lbl.textContent = `Assets (${item.assets.length})`;
    pb.appendChild(lbl);

    if (item.assets.length > 1) {
      const grid = el('div', 'p-assets-grid');
      item.assets.forEach(a => grid.appendChild(buildAssetCard(a)));
      pb.appendChild(grid);
    } else {
      const primary = item.assets[0];
      const wrap = el('div', 'p-preview');
      renderMedia(primary, wrap, true);
      wrap.style.cursor = 'pointer';
      wrap.addEventListener('click', () => openLightbox(primary));
      pb.appendChild(wrap);
      // "Open in Dropbox" link below preview
      const openRow = el('div');
      openRow.style.cssText = 'text-align:right;margin-top:-8px;margin-bottom:14px;';
      const openLink = document.createElement('a');
      openLink.textContent = 'Open file ↗';
      openLink.style.cssText = 'font-size:11px;color:#3b82f6;text-decoration:none;';
      openLink.addEventListener('click', e => {
        e.stopPropagation();
        window.open(primary.url, '_blank', 'noopener,noreferrer');
      });
      openRow.appendChild(openLink);
      pb.appendChild(openRow);
    }
  } else {
    // No assets — just a blank placeholder box, no text
    const empty = el('div', 'p-preview-empty');
    empty.style.background = '#f8fafc';
    pb.appendChild(empty);
  }

  // ── Status fields — every color column that has a value ─
  // allBoardCols has the types/titles (fetched on boot, always available)
  // _rawCols has all the values (fetched fresh in fetchDetail)
  const rawCV = item._rawCols || [];
  console.log('[STATUS] allBoardCols:', allBoardCols.length, 'rawCV:', rawCV.length);

  const statusFields = allBoardCols
    .filter(c => c.type === 'color')
    .map(c => {
      const match = rawCV.find(r => r.id === c.id);
      const value = (match?.text || '').trim();
      console.log(`[STATUS] col "${c.title}" id=${c.id} value="${value}"`);
      return { id: c.id, label: c.title, value };
    })
    .filter(f => f.value);

  console.log('[STATUS] fields to show:', statusFields.length, statusFields);

  if (statusFields.length) {
    pb.appendChild(mkdiv());
    const row = el('div', 'p-status-row');
    statusFields.forEach(({ id, label, value }) => {
      const sf = el('div', 'p-field');
      const lbl = document.createElement('label'); lbl.textContent = label; sf.appendChild(lbl);
      const sel = document.createElement('select');
      // Build option list: always include current value first
      const baseOpts = ['Pending','To Be Briefed','To Be Written','To Be Scheduled',
        'Ready For Client Review','Ready for Client Review',
        'In Production','Approved','Amends Required','On Hold','Cancelled','Scheduled'];
      const opts = [...new Set([value, ...baseOpts])];
      opts.forEach(o => sel.appendChild(new Option(o, o)));
      sel.value = value;
      const c = statusColour(value);
      sel.style.cssText = `font-weight:600;color:${c};`;
      sel.addEventListener('change', () => {
        const nc = statusColour(sel.value);
        sel.style.cssText = `font-weight:600;color:${nc};`;
        updateCol(item.id, id, sel.value).catch(console.error);
      });
      sf.appendChild(sel);
      row.appendChild(sf);
    });
    if (row.children.length) pb.appendChild(row);
  }

  // ── Meta grid ──────────────────────────────────────────
  const meta = el('div', 'p-meta');
  if (item.scheduledDate) {
    const d = new Date(item.scheduledDate + 'T00:00:00');
    let s = d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
    if (item.scheduledTimeStr) s += ' at ' + item.scheduledTimeStr;
    meta.appendChild(pmi('Scheduled', s));
  }
  if (item.groupTitle) meta.appendChild(pmi('Stage', cleanGroupTitle(item.groupTitle)));
  if (item.contentType?.[0]) meta.appendChild(pmi('Type', item.contentType[0]));
  if (item.network?.length) {
    const m = pmi('Networks', ''); m.classList.add('full');
    const nt = el('div','net-tags');
    item.network.forEach(n => { const t=el('span','net-tag'); t.textContent=n; nt.appendChild(t); });
    m.querySelector('.p-mi-v').appendChild(nt);
    meta.appendChild(m);
  }
  if (meta.children.length) pb.appendChild(meta);

  // ── Text fields ────────────────────────────────────────
  [
    ['Concept Explanation', item.conceptExpl],
    ['Concept Estimate',    item.conceptEst],
    ['Push Copy',           item.pushCopy],
  ].forEach(([label, val]) => {
    if (!val || val === '–' || val === '-') return;
    pb.appendChild(mkdiv());
    const lbl = el('div','p-sec-label'); lbl.textContent=label; pb.appendChild(lbl);
    const tb  = el('div','p-textbox');  tb.textContent=val;     pb.appendChild(tb);
  });

  if (item.conceptLink) {
    pb.appendChild(mkdiv());
    const lbl = el('div','p-sec-label'); lbl.textContent='Concept Link'; pb.appendChild(lbl);
    const a = document.createElement('a');
    a.className='p-link'; a.rel='noopener noreferrer';
    a.textContent = item.conceptLink;
    a.addEventListener('click', e => { e.preventDefault(); window.open(item.conceptLink, '_blank', 'noopener,noreferrer'); });
    pb.appendChild(a);
  }

  // ── Comments / Updates ─────────────────────────────────
  pb.appendChild(mkdiv());
  const totalReplies = item.updates.reduce((n, u) => n + (u.replies?.length || 0), 0);
  const cl = el('div','p-sec-label');
  cl.textContent = `Updates (${item.updates.length} comment${item.updates.length!==1?'s':''}, ${totalReplies} repl${totalReplies!==1?'ies':'y'})`;
  pb.appendChild(cl);

  // New comment box
  const cf = el('div','comment-form');
  const ta = document.createElement('textarea');
  ta.rows=3; ta.placeholder='Write an update… (use @Name to mention a team member)';
  cf.appendChild(ta);
  const hint = el('div','comment-hint');
  hint.textContent = 'Tip: type @Name to mention someone. Mentions will appear in monday.com notifications.';
  cf.appendChild(hint);
  const cs2 = el('div','comment-send');
  const sb = document.createElement('button'); sb.className='post-btn'; sb.textContent='Post Update';
  sb.addEventListener('click', async () => {
    const txt = ta.value.trim(); if (!txt) return;
    sb.disabled=true; sb.textContent='Posting…';
    try { await postComment(item.id, txt); await openPanel(item.id); }
    catch(e) { console.error(e); sb.disabled=false; sb.textContent='Post Update'; }
  });
  cs2.appendChild(sb); cf.appendChild(cs2); pb.appendChild(cf);

  // Comment list with replies
  if (item.updates.length) {
    item.updates.forEach(u => {
      pb.appendChild(buildCommentItem(u, item.id));
    });
  } else {
    const nc=el('div','no-comments'); nc.textContent='No updates yet'; pb.appendChild(nc);
  }
}

function buildCommentItem(u, itemId) {
  const ci = el('div','comment-item');
  const d  = new Date(u.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'numeric',minute:'2-digit'});

  // Header
  const head = el('div','comment-head');
  const author = el('span','comment-author'); author.textContent = u.creator?.name || 'Unknown';
  const date   = el('span','comment-date');   date.textContent   = d;
  head.appendChild(author); head.appendChild(date);
  ci.appendChild(head);

  // Body — render text with @mentions highlighted
  const body = el('div','comment-body');
  body.innerHTML = highlightMentions(esc(u.text_body || ''));
  ci.appendChild(body);

  // Replies list
  const replies = u.replies || [];
  if (replies.length) {
    const rl = el('div','replies-list');
    replies.forEach(r => {
      const ri = el('div','reply-item');
      const rd = new Date(r.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'numeric',minute:'2-digit'});
      const rhead = el('div','comment-head');
      const ra = el('span','comment-author'); ra.textContent = r.creator?.name || 'Unknown';
      const rda = el('span','comment-date');  rda.textContent = rd;
      rhead.appendChild(ra); rhead.appendChild(rda);
      const rb = el('div','comment-body');
      rb.innerHTML = highlightMentions(esc(r.text_body || ''));
      ri.appendChild(rhead); ri.appendChild(rb);
      rl.appendChild(ri);
    });
    ci.appendChild(rl);
  }

  // Reply button + inline reply form
  const replyBtn = document.createElement('button');
  replyBtn.className = 'comment-reply-btn';
  replyBtn.textContent = replies.length ? `↩ Reply (${replies.length})` : '↩ Reply';
  ci.appendChild(replyBtn);

  const rf = el('div','reply-form');
  const rta = document.createElement('textarea');
  rta.rows=2; rta.placeholder='Write a reply… (use @Name to mention)';
  rf.appendChild(rta);
  const ractions = el('div','reply-form-actions');
  const rsend = document.createElement('button'); rsend.className='reply-btn'; rsend.textContent='Reply';
  const rcancel = document.createElement('button'); rcancel.className='reply-cancel'; rcancel.textContent='Cancel';
  rcancel.addEventListener('click', () => { rf.classList.remove('open'); rta.value=''; });
  rsend.addEventListener('click', async () => {
    const txt = rta.value.trim(); if (!txt) return;
    rsend.disabled=true; rsend.textContent='Posting…';
    try { await postReply(u.id, txt); await openPanel(itemId); }
    catch(e) { console.error(e); rsend.disabled=false; rsend.textContent='Reply'; }
  });
  ractions.appendChild(rcancel); ractions.appendChild(rsend);
  rf.appendChild(ractions);
  ci.appendChild(rf);

  replyBtn.addEventListener('click', () => {
    rf.classList.toggle('open');
    if (rf.classList.contains('open')) rta.focus();
  });

  return ci;
}

function highlightMentions(text) {
  // Highlight @mentions in comment text
  return text.replace(/@([A-Za-z][A-Za-z0-9\s_-]{0,30})/g,
    (_, name) => `<span style="color:#3b82f6;font-weight:600;">@${name}</span>`);
}

// ─────────────────────────────────────────────────────────
// ASSET CARD (panel, multi-asset grid)
// ─────────────────────────────────────────────────────────
function buildAssetCard(asset) {
  const card = el('div','p-asset-card');
  card.addEventListener('click', () => openLightbox(asset));
  const tw = el('div','p-asset-thumb'); renderMedia(asset, tw, false);
  const inf = el('div','p-asset-info');
  inf.innerHTML=`<div class="p-asset-name">${esc(asset.name)}</div><div class="p-asset-ext">${esc(getExt(asset)||'file')}</div>`;
  card.appendChild(tw); card.appendChild(inf);
  return card;
}

// ─────────────────────────────────────────────────────────
// LIGHTBOX
// ─────────────────────────────────────────────────────────
function openLightbox(asset) {
  $('lb-name').textContent = asset.name;
  // Use the original share URL for opening, not the direct URL
  const openUrl = asset.url;
  $('lb-open').onclick = (e) => { e.preventDefault(); window.open(openUrl, '_blank', 'noopener,noreferrer'); };
  const media = $('lb-media'); media.innerHTML='';
  renderMedia(asset, media, true);
  $('lightbox').classList.add('open');
}
function closeLightbox() {
  const v=document.querySelector('#lb-media video'); if(v){v.pause();v.src='';}
  $('lightbox').classList.remove('open');
}

// ─────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────
function el(tag, cls) { const e=document.createElement(tag); if(cls) e.className=cls; return e; }
function mkdiv() { return el('div','p-div'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function svgFile(s,c) { return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`; }

function pmi(label, value) {
  const e=el('div','p-mi');
  e.innerHTML=`<div class="p-mi-l">${esc(label)}</div><div class="p-mi-v">${esc(String(value||''))}</div>`;
  return e;
}

function statusDropdown(label, options, current, onChange) {
  const sf=el('div','p-field');
  const lbl=document.createElement('label'); lbl.textContent=label; sf.appendChild(lbl);
  const sel=document.createElement('select');
  options.forEach(o => { const opt=new Option(o,o); sel.appendChild(opt); });
  sel.value=current||'';
  sel.addEventListener('change', () => onChange(sel.value).catch(console.error));
  sf.appendChild(sel);
  return sf;
}

// ─────────────────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────────────────
$('btn-prev').addEventListener('click',    () => { weekStart.setDate(weekStart.getDate()-7); renderCalendar(); });
$('btn-next').addEventListener('click',    () => { weekStart.setDate(weekStart.getDate()+7); renderCalendar(); });
$('btn-today').addEventListener('click',   () => { weekStart=getWeekStart(); renderCalendar(); scrollToNow(); });
$('btn-refresh').addEventListener('click', async () => { $('app').style.display='none'; $('loading-screen').style.display='flex'; allItems=[]; await boot(); });
$('panel-overlay').addEventListener('click', closePanel);
$('panel-x').addEventListener('click', closePanel);
$('lb-close').addEventListener('click', closeLightbox);
$('lightbox').addEventListener('click', e => { if(e.target===$('lightbox')) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { $('lightbox').classList.contains('open') ? closeLightbox() : closePanel(); }
});

// ─────────────────────────────────────────────────────────
// GO
// ─────────────────────────────────────────────────────────
boot();
</script>
