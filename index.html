<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: #f1f5f9; color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Loading ── */
#loading-screen {
  position: fixed; inset: 0; background: #f8fafc;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; z-index: 900;
}
#loading-screen .logo { font-size: 18px; font-weight: 700; color: #0f172a; }
#loading-screen .sub  { font-size: 12px; color: #94a3b8; }
.spinner { width: 28px; height: 28px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Error screen ── */
#error-screen {
  position: fixed; inset: 0; background: #f8fafc;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; padding: 40px;
}
#error-screen .err-icon { font-size: 32px; }
#error-screen .err-title { font-size: 16px; font-weight: 700; color: #0f172a; }
#error-screen .err-msg { font-size: 13px; color: #64748b; text-align: center; max-width: 400px; line-height: 1.5; }
#error-screen .err-detail { font-size: 11px; color: #ef4444; background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 8px 12px; max-width: 400px; word-break: break-all; }
.retry-btn { height: 36px; padding: 0 18px; background: #3b82f6; color: #fff; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.retry-btn:hover { background: #2563eb; }

/* ── Column map modal ── */
#col-modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 800;
  align-items: center; justify-content: center; padding: 20px;
}
#col-modal-overlay.open { display: flex; }
#col-modal {
  background: #fff; border-radius: 12px; padding: 28px;
  width: 100%; max-width: 480px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.12);
}
#col-modal h3 { font-size: 17px; font-weight: 700; color: #0f172a; margin-bottom: 6px; }
#col-modal .modal-sub { font-size: 12px; color: #64748b; margin-bottom: 20px; line-height: 1.4; }
.col-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.col-full { grid-column: 1/-1; }

/* ── App ── */

<script>
'use strict';
const $ = id => document.getElementById(id);

// ── Dropbox URL → direct renderable URL ─────────────────────────────────────
// Handles both old format (/s/) and new format (/scl/fi/)
function toDirectUrl(url) {
  if (!url || typeof url !== 'string') return null;
  const u = url.trim();
  if (!u.includes('dropbox.com')) return u;

  let out = u;

  // Swap share domain for direct-content domain
  out = out.replace('www.dropbox.com', 'dl.dropboxusercontent.com');

  // Remove dl=0 or dl=1 param (preserving other params like rlkey)
  out = out.replace(/([?&])dl=\d(&|$)/, (m, pre, post) => post === '&' ? pre : '');

  // Clean dangling ? or &
  out = out.replace(/[?&]$/, '');

  return out;
}

// ── File type detection ──────────────────────────────────────────────────────
function getExt(asset) {
  if (asset.extension) return asset.extension.toLowerCase().replace('.','');
  const url = (asset.url || '');
  // Strip query string before getting extension
  const path = url.split('?')[0];
  return (path.split('.').pop() || '').toLowerCase();
}
const isImg = e => /^(jpg|jpeg|png|gif|webp|svg|bmp|tiff)$/.test(e);
const isVid = e => /^(mp4|webm|mov|avi|mkv|m4v)$/.test(e);

// ── Normalise assets from any shape monday.com might return ─────────────────
function normaliseAssets(raw) {
  if (!raw) return [];

  const wrap = (x, i) => {
    if (!x) return null;
    if (typeof x === 'string') {
      return {
        id: 's'+i,
        name: x.split('/').pop()?.split('?')[0] || 'File',
        url: x,
        extension: (x.split('?')[0].split('.').pop() || ''),
      };
    }
    // Try every property that might hold a URL
    const url = x.url || x.publicUrl || x.public_url || x.link || x.shareUrl || x.linkUrl || '';
    if (!url) return null;
    return {
      id: x.id ? String(x.id) : ('a'+i),
      name: x.name || url.split('/').pop()?.split('?')[0] || 'File',
      url,
      extension: x.extension || x.file_extension || (url.split('?')[0].split('.').pop() || ''),
    };
  };

  let items = [];
  if (Array.isArray(raw))       items = raw;
  else if (typeof raw === 'string') items = [raw];
  else if (typeof raw === 'object') items = [raw];

  return items.map(wrap).filter(Boolean).filter(a => a.url);
}

// ── Status colours ───────────────────────────────────────────────────────────
const SC = {
  'approved':'#22c55e', 'ready for client review':'#3b82f6', 'ready for review':'#3b82f6',
  'amends required':'#f97316', 'changes requested':'#f97316', 'in production':'#a855f7',
  'on hold':'#94a3b8', 'cancelled':'#ef4444', 'pending':'#94a3b8',
};
const sc = s => SC[(s||'').toLowerCase()] || '#64748b';

// ── Date helpers ─────────────────────────────────────────────────────────────
function getWeekStart(d) {
  const x = new Date(d || new Date());
  x.setDate(x.getDate() - x.getDay());
  x.setHours(0,0,0,0);
  return x;
}
const sameDay = (a,b) => a.toDateString() === b.toDateString();
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── Column map cache ─────────────────────────────────────────────────────────
const COL_KEY = 'cc_cols_' + (CONFIG.boardId||'x');
const saveColMap = m => localStorage.setItem(COL_KEY, JSON.stringify(m));
const loadColMap = () => { try { return JSON.parse(localStorage.getItem(COL_KEY)); } catch { return null; } };
const clearColMap = () => localStorage.removeItem(COL_KEY);

// ── Column field definitions ─────────────────────────────────────────────────
const COL_FIELDS = [
  { key:'dateCol',    label:'Scheduled Date', required:true,  detect: c => c.type==='date' },
  { key:'filesCol',   label:'Files / Assets', required:false, detect: c => c.type==='file' || /asset|file/i.test(c.title) },
  { key:'conceptCol', label:'Concept Status', required:false, detect: c => /concept/i.test(c.title) && c.type==='color' },
  { key:'prodCol',    label:'Production Status', required:false, detect: c => /product/i.test(c.title) && c.type==='color' },
  { key:'typeCol',    label:'Content Type',   required:false, detect: c => /type/i.test(c.title) },
  { key:'netCol',     label:'Network / Platform', required:false, detect: c => /network|platform/i.test(c.title) },
  { key:'copyCol',    label:'Caption / Copy', required:false, detect: c => /copy|caption/i.test(c.title) },
];

function autoMapColumns(cols) {
  const map = {};
  COL_FIELDS.forEach(f => {
    const m = cols.find(f.detect);
    map[f.key] = m ? m.id : '';
  });
  return map;
}

// ── monday.com API ────────────────────────────────────────────────────────────
async function api(query) {
  const r = await fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': CONFIG.apiToken,
      'API-Version': '2024-01',
    },
    body: JSON.stringify({ query }),
  });
  if (!r.ok) throw new Error(`monday.com API returned HTTP ${r.status}. Check your API token.`);
  const j = await r.json();
  if (j.errors?.length) throw new Error(j.errors[0].message);
  return j.data;
}

async function fetchAllColumns() {
  const d = await api(`{ boards(ids:[${CONFIG.boardId}]) { columns { id title type } } }`);
  const cols = d?.boards?.[0]?.columns;
  if (!cols?.length) throw new Error('Board not found or has no columns. Check your board ID.');
  return cols;
}

async function fetchBoardItems(colMap) {
  const colIds = Object.values(colMap).filter(Boolean);
  if (!colIds.length) throw new Error('No columns mapped. Click "Remap columns" to set up.');

  const d = await api(`{
    boards(ids:[${CONFIG.boardId}]) {
      items_page(limit: 500) {
        items {
          id
          name
          assets {
            id name url public_url file_extension
          }
          column_values(ids: ${JSON.stringify(colIds)}) {
            id value text
          }
        }
      }
    }
  }`);

  return d?.boards?.[0]?.items_page?.items || [];
}

// ── Parse a raw item into a friendly object ──────────────────────────────────
function parseItem(raw, colMap) {
  const out = {
    id: raw.id, name: raw.name,
    assets: normaliseAssets(raw.assets),
    scheduledDate: null,
    conceptStatus: '', productionStatus: '',
    contentType: [], network: [], pushCopy: '',
  };

  raw.column_values.forEach(col => {
    const val = col.value, text = (col.text || '').trim();

    // Date
    if (col.id === colMap.dateCol && val) {
      try { out.scheduledDate = JSON.parse(val).date || null; } catch {}
    }

    // Status columns
    if (col.id === colMap.conceptCol) out.conceptStatus    = text;
    if (col.id === colMap.prodCol)    out.productionStatus = text;
    if (col.id === colMap.copyCol)    out.pushCopy         = text;

    // Multi-value columns
    if (col.id === colMap.typeCol && text) out.contentType = text.split(', ').filter(Boolean);
    if (col.id === colMap.netCol  && text) out.network     = text.split(', ').filter(Boolean);

    // Files column — Dropbox links land here
    if (col.id === colMap.filesCol && val) {
      try {
        const parsed = JSON.parse(val);
        console.log(`[assets] Raw files column value for "${raw.name}":`, parsed);

        const files = (parsed.files || []).flatMap((f, i) => {
          // f might have: { assetId, name, url, linkUrl, isImage, fileType }
          const url = f.url || f.linkUrl || f.link || '';
          if (!url) return [];
          return [{
            id: f.assetId ? String(f.assetId) : ('f'+i),
            name: f.name || url.split('/').pop()?.split('?')[0] || 'File',
            url,
            extension: (f.name || url.split('?')[0]).split('.').pop() || '',
          }];
        });

        if (files.length > 0) {
          console.log(`[assets] Resolved ${files.length} file(s) from column for "${raw.name}":`, files);
          out.assets = files;
        }
      } catch (e) {
        console.warn('[assets] Failed to parse files column:', e);
      }
    }
  });

  // If files column gave nothing, fall back to item assets (uploaded files)
  if (out.assets.length === 0 && raw.assets?.length > 0) {
    console.log(`[assets] Falling back to item assets for "${raw.name}":`, raw.assets);
    out.assets = normaliseAssets(raw.assets);
  }

  return out;
}

// ── App state ─────────────────────────────────────────────────────────────────
let allItems = [], weekStart = getWeekStart(), allCols = [];

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot() {
  if (!CONFIG.apiToken || CONFIG.apiToken === 'YOUR_API_TOKEN_HERE') {
    showError('API token not set', 'Open this HTML file and fill in your apiToken in the CONFIG block near the top.');
    return;
  }
  if (!CONFIG.boardId || CONFIG.boardId === 'YOUR_BOARD_ID_HERE') {
    showError('Board ID not set', 'Open this HTML file and fill in your boardId in the CONFIG block near the top.');
    return;
  }

  try {
    setLoadingMsg('Loading board columns…');
    allCols = await fetchAllColumns();

    let colMap = loadColMap();
    if (!colMap) {
      setLoadingMsg('Auto-detecting columns…');
      colMap = autoMapColumns(allCols);
      saveColMap(colMap);
      console.log('[boot] Auto-mapped columns:', colMap);
    }

    setLoadingMsg('Loading content items…');
    const rawItems = await fetchBoardItems(colMap);
    console.log('[boot] Raw items from API:', rawItems);

    allItems = rawItems
      .map(r => parseItem(r, colMap))
      .filter(i => i.scheduledDate);

    console.log('[boot] Parsed items with dates:', allItems);

    $('loading-screen').style.display = 'none';
    $('app').style.display = 'flex';
    renderCalendar();

  } catch (e) {
    console.error('[boot] Error:', e);
    showError('Could not load board', e.message);
  }
}

function showError(title, msg) {
  $('loading-screen').style.display = 'none';
  $('error-screen').style.display = 'flex';
  $('err-msg').textContent = msg || '';
}

function setLoadingMsg(msg) {
  $('loading-msg').textContent = msg;
}

// ── Column remap modal ───────────────────────────────────────────────────────
$('btn-remap').addEventListener('click', () => {
  const colMap = loadColMap() || {};
  const container = $('col-selects');
  container.innerHTML = '';

  COL_FIELDS.forEach(f => {
    const div = document.createElement('div');
    div.className = 'mfield' + (f.key === 'copyCol' ? ' col-full' : '');
    const sel = document.createElement('select');
    sel.id = 'mf-' + f.key;
    const none = new Option(f.required ? '— select —' : '— none —', '');
    sel.appendChild(none);
    allCols.forEach(c => {
      const o = new Option(`${c.title} (${c.type})`, c.id);
      sel.appendChild(o);
    });
    sel.value = colMap[f.key] || '';
    div.innerHTML = `<label>${f.label}${f.required ? ' *' : ''}</label>`;
    div.appendChild(sel);
    container.appendChild(div);
  });

  $('col-modal-overlay').classList.add('open');
});

$('modal-cancel').addEventListener('click', () => $('col-modal-overlay').classList.remove('open'));

$('modal-save').addEventListener('click', async () => {
  const newMap = {};
  COL_FIELDS.forEach(f => {
    newMap[f.key] = $('mf-' + f.key)?.value || '';
  });
  if (!newMap.dateCol) {
    alert('Please select the Scheduled Date column.');
    return;
  }
  saveColMap(newMap);
  $('col-modal-overlay').classList.remove('open');
  $('app').style.display = 'none';
  $('loading-screen').style.display = 'flex';
  await boot();
});

// ── Render calendar ──────────────────────────────────────────────────────────
function renderCalendar() {
  const cal = $('calendar');
  cal.innerHTML = '';

  const we = new Date(weekStart);
  we.setDate(weekStart.getDate() + 6);
  const sm = weekStart.getMonth() === we.getMonth();

  $('week-label').textContent = sm
    ? `${weekStart.getDate()} ${MONTHS[weekStart.getMonth()]} – ${we.getDate()}, ${we.getFullYear()}`
    : `${weekStart.getDate()} ${MONTHS[weekStart.getMonth()]} – ${we.getDate()} ${MONTHS[we.getMonth()]} ${we.getFullYear()}`;

  const today = new Date();
  let total = 0;

  for (let i = 0; i < 7; i++) {
    const day = new Date(weekStart);
    day.setDate(weekStart.getDate() + i);
    const isToday = sameDay(day, today);
    const dayItems = allItems.filter(x => sameDay(new Date(x.scheduledDate), day));
    total += dayItems.length;

    const col = document.createElement('div');
    col.className = 'day-col' + (isToday ? ' today' : '');
    col.innerHTML = `
      <div class="day-header">
        <div class="day-name">${DAYS[day.getDay()]}</div>
        <div class="day-num">${day.getDate()}</div>
        <div class="day-month">${MONTHS[day.getMonth()]}</div>
        ${dayItems.length ? `<div class="day-count">${dayItems.length} post${dayItems.length!==1?'s':''}</div>` : ''}
      </div>
      <div class="day-posts"></div>
    `;
    cal.appendChild(col);

    const posts = col.querySelector('.day-posts');
    if (!dayItems.length) {
      posts.innerHTML = '<div class="empty-day">·</div>';
    } else {
      dayItems.forEach(item => posts.appendChild(buildCard(item)));
    }
  }

  $('week-summary').textContent = `${total} ${total === 1 ? 'post' : 'posts'} this week`;
}

// ── Build item card ───────────────────────────────────────────────────────────
function buildCard(item) {
  const status = item.productionStatus || item.conceptStatus || 'Pending';
  const colour = sc(status);
  const assets = item.assets || [];
  const primary = assets[0] || null;

  const card = document.createElement('div');
  card.className = 'item-card';
  card.addEventListener('click', () => openPanel(item));

  // Status bar
  const bar = document.createElement('div');
  bar.className = 'card-bar';
  bar.style.background = colour;
  card.appendChild(bar);

  // Thumbnail
  const thumb = document.createElement('div');
  thumb.className = 'card-thumb';

  if (primary) {
    renderMediaEl(primary, thumb, false);
    if (assets.length > 1) {
      const b = document.createElement('div');
      b.className = 'count-badge';
      b.textContent = '+' + (assets.length - 1);
      thumb.appendChild(b);
    }
  } else {
    thumb.innerHTML = placeholderSVG(22, '#dde1e7');
  }
  card.appendChild(thumb);

  // Text
  const ss = status.length > 15 ? status.slice(0,14)+'…' : status;
  const meta = document.createElement('div');
  meta.className = 'card-meta';
  meta.innerHTML = `
    <div class="card-title">${esc(item.name)}</div>
    <div class="card-footer">
      <span class="card-pill" style="background:${colour}1a;color:${colour}">${esc(ss)}</span>
      ${item.network?.[0] ? `<span class="card-net">${esc(item.network[0])}</span>` : ''}
    </div>
  `;
  card.appendChild(meta);
  return card;
}

// ── Render a media element (img/video/placeholder) into a container ──────────
function renderMediaEl(asset, container, fullSize) {
  const ext = getExt(asset);
  const direct = toDirectUrl(asset.url);

  console.log(`[render] Asset: "${asset.name}" | ext: ${ext} | raw url: ${asset.url} | direct url: ${direct}`);

  if (isImg(ext) && direct) {
    const img = document.createElement('img');
    img.src = direct;
    img.alt = asset.name;
    if (fullSize) img.style.cssText = 'max-width:100%;max-height:72vh;object-fit:contain;';
    img.onerror = () => {
      console.warn('[render] Image failed to load:', direct);
      img.style.display = 'none';
      container.appendChild(Object.assign(document.createElement('div'), {
        innerHTML: placeholderSVG(32, '#94a3b8'),
        style: 'display:flex;align-items:center;justify-content:center;width:100%;height:100%;'
      }));
    };
    container.appendChild(img);

  } else if (isVid(ext) && direct) {
    const vid = document.createElement('video');
    vid.src = direct;
    vid.muted = true;
    vid.playsInline = true;
    vid.preload = 'metadata';
    if (fullSize) { vid.controls = true; vid.autoplay = true; }
    container.appendChild(vid);

  } else {
    // Unknown type — show file icon + ext label
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;width:100%;height:100%;';
    wrap.innerHTML = `
      ${placeholderSVG(28, '#94a3b8')}
      <span style="font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px">${esc(ext||'file')}</span>
    `;
    container.appendChild(wrap);
  }
}

function placeholderSVG(size, colour) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${colour}" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Detail panel ──────────────────────────────────────────────────────────────
function openPanel(item) {
  $('panel-title').textContent = item.name;
  const body = $('panel-body');
  body.innerHTML = '';

  const cs = item.conceptStatus || '';
  const ps = item.productionStatus || '';

  // Status badges
  if (cs || ps) {
    const bd = document.createElement('div');
    bd.className = 'p-badges';
    [cs, ps].filter(Boolean).forEach(s => {
      const c = sc(s);
      const b = document.createElement('span');
      b.className = 'p-badge';
      b.style.cssText = `background:${c}1a;color:${c};border:1px solid ${c}33`;
      b.textContent = s;
      bd.appendChild(b);
    });
    body.appendChild(bd);
  }

  // Meta grid
  const mg = document.createElement('div');
  mg.className = 'p-meta-grid';
  if (item.scheduledDate) {
    const d = new Date(item.scheduledDate);
    mg.appendChild(pmi('Scheduled', d.toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'})));
  }
  if (item.contentType?.[0]) mg.appendChild(pmi('Type', item.contentType[0]));
  if (item.network?.length) {
    const el = pmi('Networks', '');
    el.classList.add('full');
    const nt = document.createElement('div');
    nt.className = 'net-tags';
    item.network.forEach(n => {
      const t = document.createElement('span');
      t.className = 'net-tag';
      t.textContent = n;
      nt.appendChild(t);
    });
    el.querySelector('.p-mi-value').appendChild(nt);
    mg.appendChild(el);
  }
  if (mg.children.length) body.appendChild(mg);

  body.appendChild(mkdiv('p-div'));

  // Assets
  const al = mkdiv('p-sec');
  al.textContent = `Assets (${item.assets.length})`;
  body.appendChild(al);

  if (item.assets.length) {
    const ag = document.createElement('div');
    ag.className = 'asset-grid';
    item.assets.forEach(a => ag.appendChild(buildAssetCard(a)));
    body.appendChild(ag);
  } else {
    const na = mkdiv('no-assets');
    na.textContent = 'No assets found for this item';
    body.appendChild(na);
  }

  // Copy
  if (item.pushCopy) {
    body.appendChild(mkdiv('p-div'));
    const cl = mkdiv('p-sec'); cl.textContent = 'Copy'; body.appendChild(cl);
    const cb = mkdiv('copy-box'); cb.textContent = item.pushCopy; body.appendChild(cb);
  }

  $('panel-overlay').style.display = 'block';
  $('detail-panel').classList.add('open');
}

function closePanel() {
  $('panel-overlay').style.display = 'none';
  $('detail-panel').classList.remove('open');
}

function pmi(label, value) {
  const el = mkdiv('p-mi');
  el.innerHTML = `<div class="p-mi-label">${esc(label)}</div><div class="p-mi-value">${esc(value)}</div>`;
  return el;
}

function mkdiv(cls) {
  const el = document.createElement('div');
  if (cls) el.className = cls;
  return el;
}

// ── Asset card in panel ───────────────────────────────────────────────────────
function buildAssetCard(asset) {
  const ext = getExt(asset);
  const card = mkdiv('asset-card');
  card.addEventListener('click', () => openLightbox(asset));

  const wrap = mkdiv('asset-thumb-wrap');
  renderMediaEl(asset, wrap, false);
  card.appendChild(wrap);

  const meta = mkdiv('asset-meta');
  meta.innerHTML = `<div class="asset-name">${esc(asset.name)}</div><div class="asset-ext">${esc(ext||'file')}</div>`;
  card.appendChild(meta);
  return card;
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function openLightbox(asset) {
  $('lb-filename').textContent = asset.name;
  $('lb-open').href = asset.url;
  const media = $('lb-media');
  media.innerHTML = '';
  renderMediaEl(asset, media, true);
  $('lightbox').classList.add('open');
}

function closeLightbox() {
  const v = document.querySelector('#lb-media video');
  if (v) { v.pause(); v.src = ''; }
  $('lightbox').classList.remove('open');
}

// ── Navigation ────────────────────────────────────────────────────────────────
$('btn-prev').addEventListener('click',  () => { weekStart.setDate(weekStart.getDate()-7); renderCalendar(); });
$('btn-next').addEventListener('click',  () => { weekStart.setDate(weekStart.getDate()+7); renderCalendar(); });
$('btn-today').addEventListener('click', () => { weekStart = getWeekStart(); renderCalendar(); });
$('panel-close').addEventListener('click', closePanel);
$('panel-overlay').addEventListener('click', closePanel);
$('lb-close').addEventListener('click', closeLightbox);
$('lightbox').addEventListener('click', e => { if (e.target === $('lightbox')) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if ($('lightbox').classList.contains('open')) closeLightbox();
    else closePanel();
  }
});

// ── Start ─────────────────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
